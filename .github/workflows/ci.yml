name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Install Playwright browsers
        run: cd packages/core && npx playwright install --with-deps chromium webkit

      - name: Build core
        run: pnpm --filter @loquix/core build

      - name: Build React wrappers
        run: pnpm --filter @loquix/react build

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v5
        with:
          directory: packages/core/coverage
          flags: core
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build CDN bundle
        run: pnpm build:cdn

      - name: Build Storybook
        run: pnpm build:storybook
